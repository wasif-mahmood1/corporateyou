<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D iPhone Rotation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 100;
      font-size: 18px;
      color: #333;
    }
    #error {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 100;
      color: red;
      font-size: 16px;
      max-width: 500px;
      display: none;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Loading 3D Model...</p>
</div>
<div id="error"></div>

<script>
// Using unpkg CDN which handles ORB better
window.THREE_CDN = 'https://unpkg.com/three@r128/build/three.min.js';
window.GLTF_LOADER_CDN = 'https://unpkg.com/three@r128/examples/js/loaders/GLTFLoader.js';

// Create a simple scene without external Three.js - using Babylon.js from CDN instead
// But first, let's load Three.js properly using a script tag

function loadScript(url) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = url;
    script.onload = () => resolve();
    script.onerror = () => reject(new Error(`Failed to load ${url}`));
    script.crossOrigin = 'anonymous';
    document.head.appendChild(script);
  });
}

async function init() {
  try {
    // Load Three.js first
    console.log('Loading Three.js...');
    
    // Try multiple CDN sources in order
    const cdnSources = [
      'https://unpkg.com/three@0.128.0/build/three.min.js',
      'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js',
    ];

    let threeLoaded = false;
    for (const cdn of cdnSources) {
      try {
        console.log('Trying CDN:', cdn);
        await loadScript(cdn);
        threeLoaded = true;
        console.log('✓ Three.js loaded!');
        break;
      } catch (e) {
        console.log('Failed:', e.message);
      }
    }

    if (!threeLoaded) {
      throw new Error('Could not load Three.js from any CDN');
    }

    if (typeof THREE === 'undefined') {
      throw new Error('THREE object not available');
    }

    // Load GLTFLoader
    console.log('Loading GLTFLoader...');
    await loadScript('https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js');
    
    if (typeof THREE.GLTFLoader === 'undefined') {
      throw new Error('GLTFLoader not available');
    }

    console.log('✓ Libraries loaded successfully!');
    
    // Now initialize Three.js scene
    initThreeJS();
    
  } catch (error) {
    console.error('Init error:', error);
    const errorDiv = document.getElementById('error');
    errorDiv.innerHTML = `
      <h2>❌ Error Loading 3D Model</h2>
      <p>${error.message}</p>
      <p style="font-size: 12px; margin-top: 20px;">Make sure iphone.glb is in the same directory as this HTML file.</p>
    `;
    errorDiv.style.display = 'block';
    document.getElementById('loading').style.display = 'none';
  }
}

function initThreeJS() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);
  scene.fog = null;

  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.01,
    1000
  );
  camera.position.set(0, 0.5, 2);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0xffffff, 1.0);
  renderer.shadowMap.enabled = true;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  // Better lighting setup
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
  scene.add(ambientLight);

  const directionalLight1 = new THREE.DirectionalLight(0xffffff, 1.2);
  directionalLight1.position.set(5, 10, 7);
  directionalLight1.castShadow = true;
  scene.add(directionalLight1);

  const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.6);
  directionalLight2.position.set(-5, 5, -5);
  scene.add(directionalLight2);

  // Load model
  const loader = new THREE.GLTFLoader();
  let model = null;
  
  loader.load('iphone.glb', 
    (gltf) => {
      model = gltf.scene;
      model.scale.set(1, 1, 1);
      
      // Center and position model
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      
      model.position.x -= center.x;
      model.position.y -= center.y;
      model.position.z -= center.z;
      
      // Scale to fit view
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 1.2 / maxDim;
      model.scale.multiplyScalar(scale);
      
      scene.add(model);
      
      document.getElementById('loading').style.display = 'none';
      console.log('✓ Model loaded successfully!');
      
      // Animation loop
      function animate() {
        requestAnimationFrame(animate);
        if (model) {
          model.rotation.y += 0.005;
        }
        renderer.render(scene, camera);
      }
      animate();
    },
    (progress) => {
      const percent = (progress.loaded / progress.total) * 100;
      console.log(`Loading: ${percent.toFixed(0)}%`);
    },
    (error) => {
      console.error('Model loading error:', error);
      const errorDiv = document.getElementById('error');
      errorDiv.innerHTML = `
        <h2>❌ Failed to Load iPhone Model</h2>
        <p>Error: ${error.message}</p>
        <p style="font-size: 12px; margin-top: 20px;">Make sure iphone.glb is in: c:\\Users\\Hp\\Desktop\\corporate you\\</p>
      `;
      errorDiv.style.display = 'block';
      document.getElementById('loading').style.display = 'none';
    }
  );

  // Handle window resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// Start loading when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

</body>
</html>
